spring.application.name=Drawbridge
server.port = 8081

spring.docker.compose.enabled=false

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/drawbridge_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable SQL script initialization - using JPA only
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=drawbridge-platform-secret-key-for-jwt-signing-must-be-256-bits
jwt.expiration=86400000

# File Upload Configuration
file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
