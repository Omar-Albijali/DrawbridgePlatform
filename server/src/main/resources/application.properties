spring.application.name=Drawbridge
spring.config.import=optional:file:./server/.env[.properties],optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.docker.compose.enabled=false

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/drawbridge_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable SQL script initialization - using JPA only
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# File Upload Configuration
file.upload-dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail / Mailtrap Configuration
# Set MAILTRAP_API_TOKEN to your Mailtrap API token
mailtrap.api-token=${MAILTRAP_API_TOKEN}
# Set to true + supply an inbox ID to use the Email Sandbox (testing)
mailtrap.sandbox=${MAILTRAP_SANDBOX}
mailtrap.inbox-id=${MAILTRAP_INBOX_ID}
mailtrap.max-emails-per-second=${MAILTRAP_MAX_EMAILS_PER_SECOND:1}
mailtrap.max-retries=${MAILTRAP_MAX_RETRIES:4}
mailtrap.retry-base-delay-ms=${MAILTRAP_RETRY_BASE_DELAY_MS:5000}

# Application base URL (used in email links)
app.base-url=${APP_BASE_URL}

# Web push (VAPID) configuration
push.vapid.subject=${PUSH_VAPID_SUBJECT:mailto:no-reply@uqu-drawbridge.com}
push.vapid.public-key=${PUSH_VAPID_PUBLIC_KEY:}
push.vapid.private-key=${PUSH_VAPID_PRIVATE_KEY:}

# SMS (Twilio) configuration
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# POS webhook delivery configuration
pos.webhook.processor-delay-ms=${POS_WEBHOOK_PROCESSOR_DELAY_MS:5000}
pos.webhook.max-retries=${POS_WEBHOOK_MAX_RETRIES:6}
pos.webhook.retry-base-delay-ms=${POS_WEBHOOK_RETRY_BASE_DELAY_MS:5000}
pos.webhook.retry-max-delay-ms=${POS_WEBHOOK_RETRY_MAX_DELAY_MS:300000}
pos.webhook.request-timeout-seconds=${POS_WEBHOOK_REQUEST_TIMEOUT_SECONDS:5}
