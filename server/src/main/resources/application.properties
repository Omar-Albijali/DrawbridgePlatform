spring.application.name=Drawbridge
spring.config.import=optional:file:./server/.env[.properties],optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.docker.compose.enabled=false

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/drawbridge_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable SQL script initialization - using JPA only
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# File Upload Configuration
file.upload-dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
