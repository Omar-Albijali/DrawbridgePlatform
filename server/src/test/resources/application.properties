spring.datasource.url=jdbc:h2:mem:drawbridge_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never

jwt.secret=test-jwt-secret-for-ci-only
app.base-url=http://localhost:8080
mailtrap.api-token=mailtrap
mailtrap.sandbox=false
mailtrap.inbox-id=0
push.vapid.subject=mailto:test@example.com
push.vapid.public-key=key
push.vapid.private-key=key
twilio.account-sid=
twilio.auth-token=
twilio.from-number=

spring.application.name=Drawbridge
spring.config.import=optional:file:./server/.env[.properties],optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}


jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# File Upload Configuration
file.upload-dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


mailtrap.max-emails-per-second=${MAILTRAP_MAX_EMAILS_PER_SECOND:1}
mailtrap.max-retries=${MAILTRAP_MAX_RETRIES:4}
mailtrap.retry-base-delay-ms=${MAILTRAP_RETRY_BASE_DELAY_MS:5000}

# POS webhook delivery configuration
pos.webhook.processor-delay-ms=${POS_WEBHOOK_PROCESSOR_DELAY_MS:5000}
pos.webhook.max-retries=${POS_WEBHOOK_MAX_RETRIES:6}
pos.webhook.retry-base-delay-ms=${POS_WEBHOOK_RETRY_BASE_DELAY_MS:5000}
pos.webhook.retry-max-delay-ms=${POS_WEBHOOK_RETRY_MAX_DELAY_MS:300000}
pos.webhook.request-timeout-seconds=${POS_WEBHOOK_REQUEST_TIMEOUT_SECONDS:5}
